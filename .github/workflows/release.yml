name: Build and Release Debug Shell Container

on:
  push:
    branches:
      - main
      - release/*
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for GitVersion

      - name: Tag with GitVersion
        uses: michielvha/gitversion-tag-action@main
        id: gitversion
        with:
          configFilePath: 'gitversion.yml'

      - name: Build and Push Docker Image
        id: docker-build
        uses: michielvha/docker-release-action@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          project: debug-shell
          version: ${{ steps.gitversion.outputs.semver }}
          platforms: 'linux/amd64,linux/arm64'
          context: '.'
      
      - name: Display outputs
        run: |
          echo "📦 Image digest: ${{ steps.docker-build.outputs.image-digest }}"
