name: Build and Release Debug Shell Container

on:
  push:
    branches:
      - main
      - release/*
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: debug-shell:scan
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.0
        with:
          image-ref: debug-shell:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'  # Fail the build on any vulnerabilities
          scanners: 'vuln'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      id-token: write
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for GitVersion

      - name: Tag with GitVersion
        uses: michielvha/gitversion-tag-action@main
        id: gitversion
        with:
          configFilePath: 'gitversion.yml'

      - name: Build and Push Docker Image
        id: docker-build
        uses: michielvha/docker-release-action@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          project: debug-shell
          version: ${{ steps.gitversion.outputs.semver }}
          platforms: 'linux/amd64,linux/arm64'
          context: '.'
      
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: 1
          IMAGE_DIGEST: ${{ steps.docker-build.outputs.image-digest }}
          IMAGE_TAG: ${{ steps.gitversion.outputs.semver }}
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/debug-shell"
          
          echo "🔐 Signing image by digest (most secure)..."
          cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}" || { echo "❌ Image signing failed"; exit 1; }
          
      - name: Verify container image signature
        env:
          COSIGN_EXPERIMENTAL: 1
          IMAGE_DIGEST: ${{ steps.docker-build.outputs.image-digest }}
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/debug-shell"
          
          echo "🔍 Verifying image signature..."
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}@${IMAGE_DIGEST}" || { echo "❌ Signature verification failed"; exit 1; }
      
      - name: Display outputs
        run: |
          echo "📦 Image digest: ${{ steps.docker-build.outputs.image-digest }}"
          echo "📦 Image reference: ghcr.io/${{ github.repository_owner }}/debug-shell:${{ steps.gitversion.outputs.semver }}"
          echo "🔐 Image is signed with cosign (keyless signing via GitHub OIDC)"
