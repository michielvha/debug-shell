apiVersion: v1
kind: Pod
metadata:
  name: debug-shell
spec:
  containers:
  - name: debug-shell
    securityContext:
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
        # No capabilities added - maximum security
    resources:
      limits:
        cpu: "1"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    volumeMounts:
      - name: tmp
        mountPath: /tmp
      - name: var-tmp
        mountPath: /var/tmp
      - name: home
        mountPath: /home/debug
  volumes:
    - name: tmp
      emptyDir: {}
    - name: var-tmp
      emptyDir: {}
    - name: home
      emptyDir: {}
