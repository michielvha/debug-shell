apiVersion: v1
kind: Pod
metadata:
  name: debug-shell
  namespace: default
  labels:
    app: debug-shell
spec:
  containers:
  - name: debug-shell
    image: ghcr.io/michielvha/debug-shell:latest
    command: ["/bin/bash"]
    args: ["-c", "while true; do sleep 3600; done"]
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        add:
          - NET_RAW  # Required for ping, tcpdump, and nmap
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: "2"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
